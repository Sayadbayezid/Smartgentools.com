version: "3.8"

services:
  redis:
    image: redis:7-alpine
    container_name: smartgentools-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:6
    container_name: smartgentools-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-password}
      MONGO_INITDB_DATABASE: facebook-automation
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: smartgentools-backend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      REDIS_URL: redis://redis:6379
      MONGO_URI: mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-password}@mongodb:27017/facebook-automation?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-change-in-production}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - ./shared:/app/shared
    command: npm run dev
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: smartgentools-worker
    environment:
      NODE_ENV: development
      REDIS_URL: redis://redis:6379
      MONGO_URI: mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-password}@mongodb:27017/facebook-automation?authSource=admin
      HEADLESS: "true"
      MAX_CONCURRENT_BROWSERS: 2
      PLAYWRIGHT_TIMEOUT: 30000
      LOG_LEVEL: ${LOG_LEVEL:-debug}
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - ./shared:/app/shared
    command: npm run worker
    restart: unless-stopped

  # Optional: Mongo Express for database inspection
  mongo-express:
    image: mongo-express:latest
    container_name: smartgentools-mongo-express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USER:-admin}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASSWORD:-password}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-password}@mongodb:27017/
    depends_on:
      - mongodb
    restart: unless-stopped

volumes:
  redis_data:
    driver: local
  mongo_data:
    driver: local

networks:
  default:
    name: smartgentools-network
